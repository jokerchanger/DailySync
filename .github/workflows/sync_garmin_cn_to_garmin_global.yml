name: Sync Garmin CN to Garmin Global

on:
  workflow_dispatch:
  schedule:
    # 每 3 小时同步一次（UTC 时间 → 国内 +8 小时）
    - cron: "0 */3 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Sync Garmin CN to Garmin Global
    env:
      GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
      GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
      GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}
      # 限流优化配置
      GARMIN_RATE_LIMIT_DELAY: 5000    # 每次请求间隔 5 秒
      GARMIN_RETRY_MAX: 5              # 最多重试 5 次
      GARMIN_RETRY_BACKOFF: true       # 指数退避（1s→2s→4s...）

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # ✅ 同步前延迟 + 带重试运行脚本
      - name: Sync CN → Global
        run: |
          sleep 15  # 同步前先等 15 秒，避高峰
          npx ts-node src/sync_garmin_cn_to_global.ts
        timeout-minutes: 15  # 延长超时时间，给重试留余地

      - name: Save session
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Save Garmin Session
